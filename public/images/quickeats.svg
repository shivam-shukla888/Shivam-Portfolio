<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Mobile phone mockup -->
  <rect x="150" y="50" width="100" height="180" rx="15" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <rect x="160" y="70" width="80" height="140" rx="5" fill="#111827"/>
  
  <!-- Food items in phone -->
  <rect x="170" y="80" width="60" height="20" rx="3" fill="#fbbf24"/>
  <rect x="170" y="105" width="60" height="20" rx="3" fill="#34d399"/>
  <rect x="170" y="130" width="60" height="20" rx="3" fill="#60a5fa"/>
  <rect x="170" y="155" width="60" height="20" rx="3" fill="#f87171"/>
  
  <!-- QuickEats text -->
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">QuickEats</text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Food Ordering System</text>
  
  <!-- Decorative elements -->
  <circle cx="130" cy="100" r="15" fill="#fbbf24" opacity="0.3"/>
  <circle cx="270" cy="180" r="20" fill="#34d399" opacity="0.3"/>
  <circle cx="120" cy="200" r="10" fill="#60a5fa" opacity="0.3"/>
</svg>
